<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #main{
            width: 360px;
            height: 420px;
            border: 10px solid black;
            background-color: #b7d4a8;
            border-radius: 20px;
            margin: 50px auto;
        }
        #stage{
            width: 304px;
            height: 304px;
            box-sizing: border-box;
            border: 2px solid black;
            margin: 20px auto;
            position: relative;
        }
        #info{
            width: 304px;
            margin: 0px auto;
            display: flex;
            text-align: center;
            justify-content: space-between;
            font: bold 20px courier;
        }
        #snake > div{
            width: 10px;
            height: 10px;
            background-color: black;
            position: absolute;
            border: 1px solid #b7d4a8;
            box-sizing: border-box;

        }

        #food{
            width: 10px;
            height: 10px;
            position: absolute;
            top: 100px;
            left: 120px;
            display: flex;
            flex-flow: wrap;
        }
        #food div{
            width: 5px;
            height: 5px;
            background-color: black;
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="stage">
            <div id="snake">
                <div></div>
            </div>
            <div id="food">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
        <div id="info">
            <div>SCORE:<span id="score">0</span></div>
            <div>LEVEL:<span id="level">1</span></div>
        </div>
    </div>

    <script>
        // 蛇的移动，用户按上下左右，蛇要对应走

        // 获取蛇的容器
        const snake = document.getElementById("snake")
        // 获取蛇身体
        const snakes = snake.getElementsByTagName("div")     
        let head = snakes[0]
        let tail = snakes[0]


        // 获取食物
        const food = document.getElementById("food")

        // 获取分数和level的span
        const scoreSpan = document.getElementById("score")
        const levelSpan = document.getElementById("level")

        let score = 0
        let level = 1

        /* 
        绑定按键事件keydown keyup
            - 键盘事件只能绑定给可以获取焦点的元素或者是document，如：鼠标电上有光标焦点的，表单，超链接
            - keydown 在按下按钮，连续按的时候第一下和第二下会有卡顿
        
        */
        // 蛇的方向
        let dir
        // 记录按键的状态
        let keyActive = true
       const keyArr = ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"]
       const reObj = {
        "ArrowUp":"ArrowDown", 
        "ArrowDown":"ArrowUp", 
        "ArrowLeft":"ArrowRight", 
        "ArrowRight":"ArrowLeft"
       }
       //帮点键盘事件给document
       document.addEventListener("keydown",(event)=>{
            /*解决键盘连续按卡顿问题
                - 定义一个变量，用来存储蛇移动的方向，定义在全局
            */
            // 设置方向（他是全局作用域的，相当于给全局作用域赋值）
            if(keyActive === true && keyArr.includes(event.key)){
                /*
                游戏禁止掉头：
                    构成的条件：
                        1.身体超过2
                        2.不能往反方向走
                */
               if(snakes.length < 2 || reObj[dir] !== event.key){
                dir = event.key
                keyActive = false
               }
            }            
       })

        // 改变食物的位置（随机，取值在0到290之间且是十的倍数）
        function changeFood(){
            // 生成0-29之间的随机数
            const x = Math.floor(Math.random() * 30) * 10
            const y = Math.floor(Math.random() * 30) * 10
            food.style.left = x + "px"
            food.style.top = y + "px"
        }

       setTimeout(function move(){
        /*通过事件对象，判断用户按的是哪个按键;
                - keyCode（不推荐使用，如果有异性键盘会出错）：不同按键有不同的编码
                - key:按哪个按键就返回哪个按键的名字
            */
        //    console.log(event.keyCode);
            head = snakes[0]
            let x= head.offsetLeft
            let y = head.offsetTop
           switch (dir){
            case "ArrowUp":
                y -= 10
                break
            case "ArrowDown":
                y += 10
                break
            case "ArrowLeft":
                x -= 10
                break
            case "ArrowRight":
                x += 10
                break

           }
           snake.insertBefore(tail,snake.firstChild)
           if(head.offsetLeft === food.offsetLeft && head.offsetTop === food.offsetTop){
                // 改变食物的位置，增加蛇的身体
                changeFood()
                snake.insertAdjacentHTML("beforeend","<div></div>")
                score++
                scoreSpan.textContent = score

                if(score % 2 === 0 && level < 14){
                    level++
                    levelSpan.textContent = level
                }
                             
           }

           /*
           判断游戏是否结束：
            1.撞墙
            2.撞自己
           */
            //判断是否撞墙（0-290）
           if(x < 0 || x > 290 || y < 0 || y > 290){
                alert("撞墙了，游戏结束！")
                return
           }
            //判断是否撞自己
            for(let i=0; i<snakes.length - 1; i++){
                if(x === snakes[i].offsetLeft && y === snakes[i].offsetTop){
                    alert("撞到自己了，游戏结束！")
                    return
                }
            }

            // 获取尾巴
            tail = snakes[snakes.length - 1]

            // 蛇的移动(通过将蛇尾放到蛇头前一个位置进行移动，并将蛇尾设置为新的蛇头)
            tail.style.left = x + "px"
            tail.style.top = y + "px"
            // 将尾巴移动到蛇头的位置
            snake.insertAdjacentElement("afterbegin",tail)
            keyActive = true
           setTimeout(move,300 - level * 20)
       },300)
    </script>
</body>
</html>
